    Skills:
      - label: Wearable Motion Capture (IMU-based)
        details: "Full-body pose reconstruction from sparse IMU sensors; handling sensor noise, drift, and calibration issues"

      - label: Motion Understanding
        details: "Fusion of IMU with EMG and pressure signals for robust human motion understanding"

      - label: Multimodal Sensor Fusion
        details: "Self-supervised and contrastive learning methods for sensor-driven modeling"

      - label: Real-Time Systems and Edge Deployment
        details: "Low-latency inference pipelines with ONNX/TensorRT; experience in real-time wearable systems"

      - label: Representation Learning for Sensor Data
        details: "Self-supervised and contrastive learning for invariant and cross-modal representations"

      - label: Programming
        details: "Python (PyTorch, NumPy, SciPy), C/C++, MATLAB, Linux, ROS"

      - label: Mechanical Design and Fabrication
        details: "SolidWorks, Fusion 360, wearable structures, 3D printing, CNC machining, laser cutting, and FEA"

    Interests:
      - label: Human Motion Modeling
        details: "Learning-based motion reconstruction, pose estimation, and temporal prediction from sparse and noisy wearable sensor data"

      - label: Wearable Sensing Systems
        details: "Design of IMU-centric and multimodal sensing systems for human motion capture, with a focus on sensor fusion, calibration, and real-time data acquisitionn"

      - label: Efficient Learning for Wearable Motion Intelligence
        details: "Self-supervised representation learning and low-latency edge inference for real-time motion analysis in rehabilitation and health monitoring"


    Projects:
      - name: Gait Recognition Based on TENG Pressure Sensor
        summary: Developed gait classification workflows for wearable triboelectric pressure sensors, targeting both normal locomotion analysis and abnormal gait assessment in rehabilitation-related scenarios.
        highlights:
          - Built data preprocessing and model evaluation pipelines using MLP and decision tree/random forest notebooks
          - Organized datasets covering normal gait actions and pathological gait patterns such as Parkinsonian and hemiplegic gait

      - name: IMU Motion Capture Notes and Dataset Toolkit
        summary: Maintained a structured research repository for IMU-based motion capture, including dataset notes, coordinate systems, and rotation representations used in wearable sensing research.
        highlights:
          - Consolidated practical notes on datasets such as AMASS and related motion capture resources
          - Documented coordinate conventions and rotation descriptions to support reproducible pose estimation experiments

    